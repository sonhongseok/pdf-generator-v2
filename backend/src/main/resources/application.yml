# backend/src/main/resources/application.yml
server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pdf_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 5748
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# 외부 템플릿 파일 경로 설정 (사용자가 쉽게 열어볼 수 있는 위치)
# 기본값은 현재 백엔드 폴더(backend)의 상위 폴더(pdf-generator) 루트입니다.
app:
  template:
    path: ../certificate_template.docx

logging:
  level:
    org.hibernate.SQL: debug
